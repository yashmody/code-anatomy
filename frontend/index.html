<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tenet — DEPT®</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;1,9..40,400&family=JetBrains+Mono:wght@400;500;700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<!-- monolith design system, COPIED (monolith stays frozen & live) -->
<link rel="stylesheet" href="styles/monolith.css">
<link rel="stylesheet" href="styles/app.css">
<link rel="stylesheet" href="styles/read.css">
<link rel="stylesheet" href="styles/feed.css">
<link rel="stylesheet" href="styles/moderate.css">
<link rel="stylesheet" href="styles/techflix.css">
<link rel="stylesheet" href="styles/whatsnew.css">
</head>
<body>
  <header class="app-bar">
    <a class="app-brand" href="#/manual" aria-label="Tenet — home">
      <span class="tenet-logo"><span class="tl-b">{</span><span class="tl-n">&thinsp;10,&thinsp;8&thinsp;</span><span class="tl-b">}</span></span>
    </a>
    <nav class="mode-tabs">
      <a class="mode-tab" data-mode="manual" href="#/manual">Manual</a>
      <a class="mode-tab" data-mode="read" href="#/read">Read</a>
      <a class="mode-tab" data-mode="feed" href="#/feed">Feed</a>
      <a class="mode-tab" data-mode="techflix" href="#/techflix">Techflix</a>
      <a class="mode-tab" data-mode="whatsnew" href="#/whatsnew">What's New</a>
      <!-- Moderation: in-SPA route, HIDDEN by default. core/auth-ui.js unhides it
           only when /auth/me permissions include "moderate.view". The API enforces
           the gate server-side regardless of this nav entry. -->
      <a class="mode-tab" data-mode="moderate" id="navModerate" href="#/moderate" hidden>Moderation</a>
      <div class="res-menu" id="resMenu">
        <button class="mode-tab res-toggle" type="button" id="resToggle"
                aria-haspopup="true" aria-expanded="false" aria-controls="resDropdown">Resources ▾</button>
        <div class="res-dropdown" id="resDropdown" role="menu" aria-label="Resources" hidden>
          <!-- Quiz href set from QUIZ_URL (core/config.js) by core/main.js — Quiz is a
               separate page set, so it keeps target=_blank. The resource links below are
               SAME-TAB and re-pointed at runtime to CONTENT_BASE (/resources) by
               initChrome(); served via the Apache Alias /resources/ → content/frozen/. -->
          <a class="res-item" role="menuitem" id="resQuiz" target="_blank" rel="noopener" href="/">
            <span class="res-name">Quiz</span><span class="res-meta">Certification · CCA-F</span></a>
          <a class="res-item" role="menuitem" id="resFaqs" href="/resources/faqs/">
            <span class="res-name">FAQs</span><span class="res-meta">Vertical &amp; platform</span></a>
          <a class="res-item" role="menuitem" id="resChecklist" href="/resources/checklists/">
            <span class="res-name">Checklist</span><span class="res-meta">Discovery</span></a>
          <a class="res-item" role="menuitem" id="resRunbook" href="/resources/runbooks/">
            <span class="res-name">Runbooks</span><span class="res-meta">All roles</span></a>
        </div>
      </div>
    </nav>
    <div class="app-auth" id="appAuth"></div>
    <button class="theme-btn" type="button" onclick="toggleAppTheme()"><span id="themeLabel">Dark</span></button>
  </header>
  <main id="view" class="view"></main>
  <footer class="app-footer">
    <span class="app-foot-text"><span class="tenet-logo tenet-logo--sm"><span class="tl-b">{</span><span class="tl-n">&thinsp;10,&thinsp;8&thinsp;</span><span class="tl-b">}</span></span> · a DEPT® platform</span>
    <span class="app-version">v0.1.0-beta</span>
  </footer>
  <script type="module" src="core/main.js"></script>
</body>
</html>
