# ============================================================================
# DEPT Anatomy of Code — Directus (CMS), PRODUCTION deploy shape.
# Phase 4a. This is the DOCUMENTED PROD DEFAULT for running Directus on the VM.
#
# Two supported VM shapes (pick ONE — they are mutually exclusive):
#   (A) THIS docker-compose.yml          — documented prod DEFAULT.
#   (B) systemd unit running `npm start` — the ALTERNATIVE (owned by 4a-3
#       infra: a directus.service that runs `directus start` under the cca
#       user, mirroring how deploy.sh already runs uvicorn).
# Both connect to the SAME host Postgres "codecoder" as role directus_app and
# reverse-proxy through the same Apache (4a-3) under /cms or cms.<domain>.
#
# Docker daemon was DOWN at authoring time, so this compose file is authored +
# committed but BOOTED LOCALLY VIA npm (see README). It is the as-code artifact
# for the VM; the live local verification used `npx directus start`.
#
# The image tag is pinned to match the `directus` npm version in package.json.
# ============================================================================
services:
  directus:
    image: directus/directus:11.17.4
    container_name: dept-anatomy-directus
    restart: unless-stopped
    ports:
      # Bind to loopback on the host; Apache (4a-3) terminates TLS and proxies.
      - "127.0.0.1:8055:8055"
    # Reach the host's Postgres from inside the container. On Docker Desktop
    # host.docker.internal resolves automatically; on Linux VMs the
    # extra_hosts line below maps it to the gateway so the same .env works.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Connection to the existing host Postgres as the scoped directus_app
      # role. DB_HOST is overridden here (container cannot use "localhost").
      DB_CLIENT: pg
      DB_HOST: host.docker.internal
      DB_PORT: "5432"
      DB_DATABASE: codecoder
      DB_USER: directus_app
      # Everything else (KEY, SECRET, PUBLIC_URL, ADMIN_*, AUTH_GOOGLE_*,
      # STORAGE_*, DB_PASSWORD, CORS, CACHE, FLOWS) is supplied from cms/.env.
    env_file:
      - ./.env
    volumes:
      # Tiny named volume for Directus-INTERNAL files only (e.g. avatars).
      # App media is NEVER stored here: all media bytes live in Postgres large
      # objects and are streamed by FastAPI /media/* (no S3, no object store,
      # no filesystem media store). App-media uploads into Directus Files are
      # disabled by permission. This volume stays small.
      - directus_uploads:/directus/uploads
      # Extensions (Hooks/Flows custom ops) if added in 4c. Empty in 4a.
      - directus_extensions:/directus/extensions
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8055/server/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  directus_uploads:
  directus_extensions:
