# ============================================================================
# DEPT(R) Anatomy of Code - PostgreSQL tuning snippet
# ----------------------------------------------------------------------------
# Owner docs: 06-caching-performance.md section 6.1, 03-data-model.md section 7.
#
# This is a conf.d *include* snippet, NOT a full postgresql.conf. deploy.sh
# copies it into the server's conf.d directory (RHEL:
# /var/lib/pgsql/<ver>/data/conf.d/, Debian: /etc/postgresql/<ver>/main/conf.d/)
# or appends an `include_dir 'conf.d'` line if the base config lacks one. Every
# value here overrides the matching default; anything not set keeps the stock
# default.
#
# VM-SIZE ASSUMPTION: a single small Azure VM at the deploy.sh baseline of
# 4 vCPU / 8 GB RAM (see deploy.sh:43). Postgres co-tenants the box with the
# FastAPI app, Apache, and (Phase 4) Directus, so the memory budget below is
# deliberately conservative - it does NOT assume Postgres owns the whole RAM.
# Re-tune with pgbench + the section 8 smoke after the first production soak
# (Phase 3b) before raising any of these.
# ============================================================================

# -- Memory -----------------------------------------------------------------
# 25% of 8 GB. The classic shared_buffers rule of thumb. The OS page cache
# (effective_cache_size below) does the heavy lifting; oversizing this on a
# shared box just steals RAM from the app and the page cache.
shared_buffers = 1GB

# ~50% of RAM. This is a *planner hint*, not an allocation - it tells the
# planner how much data is likely cached (PG shared_buffers + OS page cache
# combined), nudging it toward index scans over seq scans. Safe to estimate
# high; it reserves nothing.
effective_cache_size = 4GB

# Per sort / hash node, per connection - so the real ceiling is
# work_mem x active_sorts. We run JSONB + GIN (feed search, topics) which
# can sort/hash sizeable intermediate sets; 16 MB keeps complex feed/quiz
# queries off disk without risking OOM at our modest connection count.
work_mem = 16MB

# For VACUUM, CREATE INDEX, ALTER TABLE. Larger = faster maintenance, and it
# is only used by a handful of maintenance backends at a time, so it can be
# far more generous than work_mem on an 8 GB box.
maintenance_work_mem = 256MB

# -- Connections ------------------------------------------------------------
# Generous ceiling. The SQLAlchemy pool math (06 section 6.2) caps the app at
# ~30 connections (5 pool + 10 overflow per worker x 2 workers), leaving
# headroom for psql sessions, the ETL/seed scripts, the raw large-object
# streaming connections (03 section 7.1 - these bypass the pool), and a
# future Directus pool (Phase 4, sized to 10). At 8+ workers we move to
# PgBouncer rather than raise this.
max_connections = 100

# -- WAL / checkpoints ------------------------------------------------------
# Compress full-page images in the WAL - trades a little CPU for less WAL I/O
# and smaller backups. A clear win on an SSD-backed single VM.
wal_compression = on

# Spread checkpoints out so they do not spike I/O. 15 min between checkpoints
# with completion_target 0.9 smooths the write storm across most of the
# interval instead of bursting at the end.
checkpoint_timeout = 15min
max_wal_size = 2GB
checkpoint_completion_target = 0.9

# -- Planner (SSD assumptions) ----------------------------------------------
# The default 4.0 assumes spinning rust where random reads are ~4x sequential.
# Azure managed disks are SSD/NVMe, so random and sequential cost are nearly
# equal - 1.1 stops the planner from irrationally avoiding index scans.
random_page_cost = 1.1

# How many concurrent I/O requests the storage can service. SSDs handle deep
# queues; 200 lets bitmap heap scans prefetch aggressively.
effective_io_concurrency = 200

# -- Logging (slow-query log; feeds the section 8 baselines) ----------------
# THE slow-query log. Any statement taking >= 500 ms is logged with its
# duration. Cheap at our volume, and it is the single most useful signal for
# catching a regression after a deploy. Reading it is documented in
# docs/RUNBOOK.md.
log_min_duration_statement = 500ms

# Record each checkpoint - lets us spot checkpoints firing too often (a sign
# max_wal_size is too small).
log_checkpoints = on

# Log when a session waits on a lock longer than deadlock_timeout - surfaces
# contention before it becomes a user-visible stall.
log_lock_waits = on

# Log temp-file creation above 10 MB - a query spilling large temp files is a
# hint that work_mem is too low for that workload.
log_temp_files = 10MB
