# Alembic configuration for DEPT Anatomy of Code backend.
#
# Phase 2a: this file replaces backend/deploy_schema.sql + db.py:_migrate()
# as the single source of truth for schema evolution.
#
# Run from the backend/ directory:
#   .venv/bin/alembic upgrade head
#   .venv/bin/alembic revision --autogenerate -m "..."
#   .venv/bin/alembic stamp head
#
# The DATABASE_URL is read from the environment in migrations/env.py so the
# same setting drives both the app and the migrations.

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url is intentionally blank — env.py reads DATABASE_URL from os.environ
# (falling back to app.core.config.DATABASE_URL) so the migration tool uses the
# same DB as the running app.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
